<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Expires" content="Mon, 06 Jan 1990 00:00:01 GMT">
    <!--위의 명시된 날짜 이후가 되면 페이지가 캐싱되지 않는다.(1990년 이후 쭉 )-->
    <meta http-equiv="Expires" content="-1">
    <!--캐시된 페이지가 만료되어 삭제되는 시간을 정의하나 특별한 경우가 아니면 -1로 설정-->
    <meta http-equiv="Pragma" content="no-cache">
    <!--페이지 로드시마다 페이지를 캐싱하지 않는다.(HTTP 1.0)-->
    <meta http-equiv="Cache-Control" content="no-cache">
    <!--페이지 로드시마다 페이지를 캐싱하지 않는다.(HTTP 1.1)-->
    <title>Clock</title>
    <style>
        body{
            background: #333;
        }
        .clock {
            position: absolute;
            font-size: 3rem;
            text-align: center;
            color: yellow;
            font-family: arial;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .clock span{
            padding: 15px;
            background: #444;
        }
    </style>
</head>
<body>
    
    <div class="clock"></div>

    <script>
        const clock = document.querySelector('.clock');
        const tick = () => {
            const now = new Date();
            const h = addZero(now.getHours());
            const m = addZero(now.getMinutes());
            const s = addZero(now.getSeconds());

            const html = `
                <span>${h}</span> : 
                <span>${m}</span> : 
                <span>${s}</span>        
            `;
            clock.innerHTML = html;
        };
        setInterval(tick, 1000);

        function addZero(i) {
        if (i < 10) { i="0" + i; } return i; }
    </script>
</body>
</html>
