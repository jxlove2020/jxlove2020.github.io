<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Expires" content="Mon, 06 Jan 1990 00:00:01 GMT">
    <!--위의 명시된 날짜 이후가 되면 페이지가 캐싱되지 않는다.(1990년 이후 쭉 )-->
    <meta http-equiv="Expires" content="-1">
    <!--캐시된 페이지가 만료되어 삭제되는 시간을 정의하나 특별한 경우가 아니면 -1로 설정-->
    <meta http-equiv="Pragma" content="no-cache">
    <!--페이지 로드시마다 페이지를 캐싱하지 않는다.(HTTP 1.0)-->
    <meta http-equiv="Cache-Control" content="no-cache">
    <!--페이지 로드시마다 페이지를 캐싱하지 않는다.(HTTP 1.1)-->
    <link rel="stylesheet" href="css/style.css">
    <title>FullScreen</title>
</head>
<body>
    <div>
        <video id="videoMovie" preload="auto" autoplay="true" loop="loop" muted="muted" volume="0">
            <source src="movie/beaches.mp4">
        </video>
        <div class="content">
            <div class="dimContent">
                <h3>beaches</h3>
                <p class="text-white">Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorum a, autem hic necessitatibus repudiandae, aliquid qui fugit eius at nisi sint ex est minima. Ut laboriosam reprehenderit dolores quisquam nam!
                Rerum delectus quasi eum perferendis amet sapiente facere nemo repellat! </p>
            </div>
        </div>
    </div>
</body>
</html>
