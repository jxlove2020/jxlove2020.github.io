<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>
</head>

<body>
    <div style="width: 80%; margin: 50px auto;">
        <h3>Multi Line Chart</h3>
        <canvas id="myChart"></canvas>
    </div>

    <script>
        let ctx = document.getElementById("myChart").getContext('2d');
        /*
        - ChartлҘј мғқм„ұн•ҳл©ҙм„ң,
        - ctxлҘј мІ«лІҲм§ё argumentлЎң л„ҳкІЁмЈјкі ,
        - л‘җлІҲм§ё argumentлЎң к·ёлҰјмқ„ к·ёлҰҙл•Ң н•„мҡ”н•ң мҡ”мҶҢл“Өмқ„ лӘЁл‘җ л„ҳкІЁмӨҚлӢҲлӢӨ.
        */

        let retLabels = ['2017', '2018', '2019', '2020'];
        let retDatas1 = [79, 80, 25, 60];
        let retDatas2 = [50, 40, 30, 95];
        let retDatas3 = [57, 69, 48, 35];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: retLabels /*['2008', '2009',...]*/ ,
                datasets: [{
                        label: "A",
                        backgroundColor: 'rgba(234,70,42, .3)',
                        borderColor: 'rgba(234,70,42, .3)',
                        data: retDatas1
                    },
                    {
                        label: "B",
                        backgroundColor: 'rgba(159,180,10, .5)',
                        borderColor: 'rgba(159,180,10, .5)',
                        data: retDatas2
                    },
                    {
                        label: "C",
                        backgroundColor: 'rgba(246,174,14, .5)',
                        borderColor: 'rgba(246,174,14, .5)',
                        data: retDatas3
                    }
                ]
            },
            options: {
                maintainAspectRatio: true, // default value. falseмқј кІҪмҡ° нҸ¬н•Ёлҗң divмқҳ нҒ¬кё°м—җ л§һм¶°м„ң к·ёл Өм§җ.
                responsive: true,
                scales: {
                    yAxes: [{
                        ticks: {
                            beginAtZero: true,
                            callback: function (value, index, values) {
                                if (parseInt(value) >= 1000) {
                                    return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                                } else {
                                    return value;
                                }
                            }
                        }
                    }]
                }
            }
        });
    </script>
</body>

</html>
